services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: etutoring-backend:latest
    container_name: eTutoring-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in .env}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eTutoring
      SPRING_DATASOURCE_USERNAME: eTutoring
      SPRING_DATASOURCE_PASSWORD: eTutoring_pw
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: 
      SPRING_MAIL_PASSWORD: 
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: false
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: false

  postgres:
    image: postgres:18.2
    container_name: eTutoring-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eTutoring
      POSTGRES_USER: eTutoring
      POSTGRES_PASSWORD: eTutoring_pw
    volumes:
      - ./postgres-data:/var/lib/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eTutoring -d eTutoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: eTutoring-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
