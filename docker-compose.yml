services:
  postgres:
    image: postgres:18.2
    container_name: eTutoring-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eTutoring
      POSTGRES_USER: eTutoring
      POSTGRES_PASSWORD: eTutoring_pw
    volumes:
      - ./postgres-data:/var/lib/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eTutoring -d eTutoring"]
      interval: 5s
      timeout: 5s
      retries: 10
