spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.from=${SPRING_MAIL_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL}

allocation.preview.work-start-hour=${ALLOCATION_PREVIEW_WORK_START_HOUR:9}
allocation.preview.work-end-hour=${ALLOCATION_PREVIEW_WORK_END_HOUR:17}
allocation.preview.lunch-start-hour=${ALLOCATION_PREVIEW_LUNCH_START_HOUR:12}
allocation.preview.lunch-end-hour=${ALLOCATION_PREVIEW_LUNCH_END_HOUR:13}
